services:
  - type: web
    name: petpal-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-prod.txt
    startCommand: cd petpal && python manage.py migrate && python manage.py seed_pets_if_empty && gunicorn petpal.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PETPAL_OWNER_EMAIL
        value: meganbenn27@icloud.com
      # Pet photos: add CLOUDINARY_URL in the Render dashboard (free tier).
      # Copy from Cloudinary Console → API Keys → "API environment variable".
      # Without this, uploads are lost on every redeploy.
