services:
  - type: web
    name: petpal-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd petpal && python manage.py migrate
    startCommand: cd petpal && gunicorn petpal.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
